name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Cache bashunit
        id: cache-bashunit
        uses: actions/cache@v5
        with:
          path: lib
          key: bashunit-0.34.1
      - name: Install bashunit
        if: steps.cache-bashunit.outputs.cache-hit != 'true'
        run: curl -s https://bashunit.typeddevs.com/install.sh | bash -s lib 0.34.1
      - run: ./lib/bashunit action_test.sh
